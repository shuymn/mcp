name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Deltect Bun version
        id: bun-version
        run: echo "version=$(cat .bun-version || echo 'latest')" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@b7a1c7ccf290d58743029c4f6903da283811b979 # v2.1.0
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies
        run: bun install

      - name: Run biome checks (format + lint)
        run: bun run check

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        env:
          OPENAI_API_KEY: dummy
        run: bun run test
